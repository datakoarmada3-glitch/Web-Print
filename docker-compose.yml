services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_printer_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: web_printer
      DB_USERNAME: web_printer
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      CUPS_SERVER: cups
    depends_on:
      - db
      - redis
      - cups
    networks:
      - web_printer

  nginx:
    image: nginx:1.27-alpine
    container_name: web_printer_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - web_printer

  db:
    image: mariadb:11.4
    container_name: web_printer_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: web_printer
      MYSQL_USER: web_printer
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - web_printer

  redis:
    image: redis:7-alpine
    container_name: web_printer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - web_printer

  cups:
    build:
      context: ./docker/cups
      dockerfile: Dockerfile
    container_name: web_printer_cups
    restart: unless-stopped
    ports:
      - "6631:631"
    volumes:
      - cups_data:/etc/cups
    networks:
      - web_printer

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_printer_worker
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=prints --sleep=3 --tries=3 --timeout=180
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: web_printer
      DB_USERNAME: web_printer
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      CUPS_SERVER: cups
    depends_on:
      - app
      - db
      - redis
      - cups
    networks:
      - web_printer

volumes:
  db_data:
  cups_data:

networks:
  web_printer:
    driver: bridge
